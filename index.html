<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wird geladen…</title>
    <style>
      html, body {
        min-height: 100%;
        margin: 0;
      }

      body {
        background: #0b1020;
        color: #f8fafc;
      }

      #dp-app-boot {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background:
          radial-gradient(circle at center, rgba(255, 107, 44, 0.14), transparent 42%),
          linear-gradient(180deg, #0b1020 0%, #0f172a 100%);
        transition: opacity 0.18s ease, visibility 0.18s ease;
      }

      #dp-app-boot::after {
        content: "";
        width: 68px;
        height: 68px;
        border-radius: 999px;
        border: 3px solid rgba(248, 250, 252, 0.16);
        border-top-color: #ff6b2c;
        animation: dp-app-boot-spin 0.9s linear infinite;
        box-shadow: 0 0 36px rgba(255, 107, 44, 0.2);
      }

      body.dp-app-ready #dp-app-boot {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      @keyframes dp-app-boot-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
    <meta
      name="description"
      content="White-Label SaaS für Agenturen, Freelancer und Webdesigner – modular, performant und mandantenfähig für starke digitale Marken."
    />

    <meta property="og:title" content="Digital Perfect Hub | White-Label SaaS für Agenturen" />
    <meta
      property="og:description"
      content="White-Label SaaS für Agenturen, Freelancer und Webdesigner – modular, performant und mandantenfähig für starke digitale Marken."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/placeholder.svg" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="/placeholder.svg" />
  </head>

  <body>
    <div id="dp-app-boot" aria-hidden="true"></div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
